<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Oswld Sound</title>
<style>
body {
  background-color: #0F1214;
  color: white;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  margin: 0;
  padding: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  text-align: center;
}

.container {
  max-width: 700px;
  width: 100%;
  padding: 40px 20px;
}

h1 {
  font-size: 3.5em;
  margin: 0 0 10px 0;
  font-weight: 700;
}

h2 {
  font-size: 1.4em;
  font-weight: 400;
  margin-top: 0;
  margin-bottom: 50px;
  color: #cccccc;
}

.section-title {
  font-size: 1.2em;
  font-weight: 600;
  margin-top: 40px;
  margin-bottom: 15px;
  letter-spacing: 1px;
  text-transform: uppercase;
}

a {
  display: inline-block;
  color: white;
  text-decoration: none;
  font-size: 1.3em;
  margin: 12px 0;
  padding-left: 0;
  position: relative;
  transition: all 0.3s ease;
}

a::before {
  content: '';
  position: absolute;
  left: -20px;
  bottom: 0;
  width: 0;
  height: 2px;
  background-color: #00ffff;
  transition: all 0.3s ease;
}

a:hover {
  color: #00ffff;
  transform: translateX(5px);
}

a:hover::before {
  width: 20px;
  left: 0;
}

.footer {
  margin-top: 80px;
  font-size: 0.9em;
  color: #888888;
}
</style>
</head>
<body>

<div class="container">
  <h1>Oswld Sound</h1>
  <h2>Close Your Eyes</h2>

  <div class="section">
    <div class="section-title">Beats</div>
    <a href="https://oswldsound.beatstars.com" target="_blank">oswldsound.beatstars.com</a>
  </div>

  <div class="section">
    <div class="section-title">Credits</div>
    <a href="https://credits.muso.ai/profile/b9d6627c-d639-4b0f-bddc-f729d2612a7c" target="_blank">credits.muso.ai</a>
  </div>

  <div class="section">
    <div class="section-title">Email</div>
    <a href="mailto:os@oswldsound.com">os@oswldsound.com</a>
  </div>

  <div class="section">
    <div class="section-title">Instagram</div>
    <a href="https://www.instagram.com/oswldsound/" target="_blank">Instagram</a>
  </div>

  <div class="footer">
    &copy; Oswld Sound
  </div>
</div>

</body>
</html>
