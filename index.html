<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Oswld Sound</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* { box-sizing: border-box; margin:0; padding:0; }

body {
  background:#000;
  color:#fff;
  font-family:"Helvetica Neue";
  width:100%;
  overflow-x:hidden;
  scrollbar-width:none;
}

body::-webkit-scrollbar { display:none; }

.container {
  max-width:650px;     /* contenido más desplazado a la derecha */
  margin:0 auto;       
  display:flex;
  flex-direction:column;
  align-items:flex-start; 
  padding:120px 0;     
  width:100%;
}

h1 { font-size:3rem; font-weight:700; margin-bottom:20px; }

h2 { font-size:1.25rem; font-weight:400; margin-bottom:60px; color:#ccc; text-transform:lowercase; }

.main-links, .secondary-links {
  display:flex;
  flex-direction:column;
  width:100%;
}

.main-links { gap:30px; font-size:2rem; }

.secondary-links { gap:30px; margin-top:60px; font-size:1.25rem; color:#aaa; }

a { color:#fff; text-decoration:none; transition:color .25s ease; }

a.underline { text-decoration:underline; text-decoration-thickness:2px; }

a:hover { color:#ddd; }

@media (max-width:600px) {
  .container { padding:40px 30px; } /* móvil 30px lateral */
  h1 { font-size:2.5rem; margin-bottom:10px; }
  h2 { font-size:1rem; margin-bottom:40px; }
  .main-links { font-size:1.5rem; gap:20px; }
  .secondary-links { margin-top:40px; gap:20px; }
}
</style>
</head>

<body>
<div class="container">
  <h1>OS</h1>
  <h2>close your eyes</h2>

  <div class="main-links">
    <a href="https://oswldsound.beatstars.com" class="underline" target="_blank">Beats</a>
    <a href="https://credits.muso.ai/profile/b9d6627c-d639-4b0f-bddc-f729d2612a7c" class="underline" target="_blank">Credits</a>
  </div>

  <div class="secondary-links">
    <a href="mailto:os@oswldsound.com">Email</a>
    <a href="https://www.instagram.com/oswldsound/" target="_blank">Instagram</a>
    <a href="https://www.youtube.com/@oswldsound" target="_blank">YouTube</a>
  </div>
</div>
</body>
</html>
