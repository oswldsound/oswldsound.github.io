<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Oswld Sound</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
  margin:0;
  min-height:100vh;
  background:#000;
  color:#fff;
  font-family:"Helvetica Neue", Helvetica, Arial, sans-serif;
  overflow-y:scroll;
  scrollbar-width:none;
}

body::-webkit-scrollbar{
  display:none;
}

.container{
  display:flex;
  flex-direction:column;
  align-items:flex-start;
  padding:120px 80px;
}

h1{
  font-size:3rem;
  font-weight:700;
  margin:0 0 20px 0;
}

h2{
  font-size:1.25rem;
  font-weight:400;
  margin:0 0 40px 0; /* espacio desktop */
  color:#ccc;
  text-transform:lowercase;
}

.main-links{
  display:flex;
  flex-direction:column;
  gap:40px; /* espacio entre Beats y Credits en desktop */
  font-size:2rem;
}

.secondary-links{
  display:flex;
  flex-direction:column;
  gap:20px; /* espacio entre Email, Instagram, YouTube */
  font-size:1.25rem;
  margin-top:40px; /* espacio entre Credits y Email en desktop */
  color:#aaa;
}

.link{
  color:#fff;
  text-decoration:none;
  transition:color .25s ease;
}

.underline{
  text-decoration:underline;
  text-decoration-thickness:2px;
}

.link:hover{
  color:#ddd;
}

/* Móvil */
@media (max-width:600px){

  .container{
    padding:60px 20px;
  }

  h1{
    font-size:2.5rem;
    margin-bottom:10px;
  }

  h2{
    font-size:1rem;
    margin-bottom:40px; /* más espacio entre h2 y Beats, igual que entre Credits y Email */
  }

  .main-links{
    font-size:1.5rem;
    gap:20px; /* espacio entre Beats y Credits en móvil */
  }

  .secondary-links{
    margin-top:0; /* no necesitamos añadir margen extra */
  }

}

</style>
</head>

<body>

<div class="container">

<h1>OS</h1>
<h2>close your eyes</h2>

<div class="main-links">
<a href="https://oswldsound.beatstars.com" class="link underline" target="_blank">Beats</a>
<a href="https://credits.muso.ai/profile/b9d6627c-d639-4b0f-bddc-f729d2612a7c" class="link underline" target="_blank">Credits</a>
</div>

<div class="secondary-links">
<a href="mailto:os@oswldsound.com" class="link">Email</a>
<a href="https://www.instagram.com/oswldsound/" class="link" target="_blank">Instagram</a>
<a href="https://www.youtube.com/@oswldsound" class="link" target="_blank">YouTube</a>
</div>

</div>

</body>
</html>
