<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Oswld Sound</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
html, body {
  margin: 0;
  height: 100%;
  background: #000;
  color: #fff;
  font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
}

.container {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  padding: 120px 80px;
  gap: 50px;
}

/* Título principal */
h1 {
  font-size: 3rem;
  font-weight: 700;
  margin: 0 0 20px 0;
}

/* Subtítulo */
h2 {
  font-size: 1.25rem;
  font-weight: 400;
  margin: 0 0 80px 0; /* se mantiene la posición original */
  color: #ccc;
  text-transform: lowercase;
}

/* Links principales */
.main-links {
  display: flex;
  flex-direction: column;
  gap: 40px;
  font-size: 2rem;
  margin-top: -40px; /* sube los enlaces hacia close your eyes */
}

.link {
  color: #fff;
  cursor: pointer;
  text-decoration: none;
  transition: color 0.25s ease;
}

.link.underline {
  text-decoration: underline;
  text-decoration-thickness: 2px;
  text-decoration-color: #fff;
}

.link:hover {
  color: #ddd;
}

/* Links secundarios */
.secondary-links {
  display: flex;
  flex-direction: column;
  gap: 20px;
  font-size: 1.25rem;
  color: #aaa;
}

.secondary-links .link:hover {
  color: #ddd;
}

/* Ajustes mínimos para móviles */
@media (max-width: 600px) {
  h1 {
    font-size: 2.5rem;
  }
  h2, .secondary-links {
    font-size: 1rem;
  }
  .main-links {
    font-size: 1.5rem;
  }
}
</style>
</head>
<body>

<div class="container">
  <h1>OS</h1>
  <h2>close your eyes</h2>

  <div class="main-links">
    <a href="https://oswldsound.beatstars.com" class="link underline" target="_blank">Beats</a>
    <a href="https://credits.muso.ai/profile/b9d6627c-d639-4b0f-bddc-f729d2612a7c" class="link underline" target="_blank">Credits</a>
  </div>

  <div class="secondary-links">
    <a href="mailto:os@oswldsound.com" class="link">Email</a>
    <a href="https://www.instagram.com/oswldsound/" class="link" target="_blank">Instagram</a>
    <a href="https://www.youtube.com/@oswldsound" class="link" target="_blank">YouTube</a>
  </div>
</div>

</body>
</html>
