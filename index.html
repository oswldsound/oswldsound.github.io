<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Oswld Sound</title>
<style>
body {
  margin: 0;
  background: #000;
  color: #fff;
  font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
  padding: 120px 80px;
}

h1 {
  font-size: 3rem;
  font-weight: 700;
  margin: 0 0 20px 0;
}

h2 {
  font-size: 1.25rem; /* tamaño de close your eyes */
  font-weight: 400;
  margin: 0 0 80px 0;
  color: #ccc;
  text-transform: lowercase;
}

.links {
  display: flex;
  flex-direction: column;
  gap: 50px;
  align-items: flex-start;
}

/* Beats y Credits: principales, grandes y subrayados */
.main-links {
  display: flex;
  flex-direction: column;
  gap: 40px;
  font-size: 2rem;
}

.link {
  color: #fff;
  cursor: pointer;
  text-decoration: none;
  transition: color 0.25s ease;
}

.link.underline {
  text-decoration: underline;
  text-decoration-thickness: 2px;
  text-decoration-color: #fff;
}

.link:hover {
  color: #ddd;
}

/* Email, Instagram, YouTube: mismos que close your eyes */
.secondary-links {
  display: flex;
  flex-direction: column;
  gap: 20px;
  font-size: 1.25rem; /* igual que h2 */
  color: #aaa; /* gris suave */
}

.secondary-links .link:hover {
  color: #ddd;
}
</style>
</head>
<body>

<h1>OS</h1>
<h2>close your eyes</h2>

<div class="links">
  <div class="main-links">
    <a href="https://oswldsound.beatstars.com" class="link underline" target="_blank">Beats</a>
    <a href="https://credits.muso.ai/profile/b9d6627c-d639-4b0f-bddc-f729d2612a7c" class="link underline" target="_blank">Credits</a>
  </div>

  <div class="secondary-links">
    <a href="mailto:os@oswldsound.com" class="link">Email</a>
    <a href="https://www.instagram.com/oswldsound/" class="link" target="_blank">Instagram</a>
    <a href="https://www.youtube.com/@oswldsound" class="link" target="_blank">YouTube</a>
  </div>
</div>

</body>
</html>
